# Prometheus config for the OTel lab.
#
# Sources of metrics:
#   1. remote_write from Tempo (service-graph + span-metrics)
#   2. remote_write from the OTel Collector (OTel-agent JVM metrics)
#   3. Stage B: direct scrape of jmx_prometheus_javaagent endpoints on the
#      Hadoop / HBase / Kafka JVMs

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: local-otel-lab

storage:
  tsdb:
    out_of_order_time_window: 30m

scrape_configs:
  # --- Stage B: jmx_prometheus_javaagent endpoints ------------------------
  - job_name: kafka
    metrics_path: /metrics
    static_configs:
      - targets: [ 'kafka:7071' ]
        labels:
          service: kafka
  - job_name: hbase-master
    static_configs:
      - targets: [ 'hbase-master:7072' ]
        labels:
          service: hbase-master
  - job_name: hbase-regionserver
    static_configs:
      - targets: [ 'hbase-regionserver:7073' ]
        labels:
          service: hbase-regionserver
  - job_name: hadoop-namenode
    static_configs:
      - targets: [ 'namenode:7074' ]
        labels:
          service: hadoop-namenode
  - job_name: hadoop-datanode
    static_configs:
      - targets: [ 'datanode:7075' ]
        labels:
          service: hadoop-datanode
