# Provisions the Tempo datasource. Stage A turns on the Service Map and
# Traces-to-Metrics features, both of which need a Prometheus datasource UID.
apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: true
    editable: true
    jsonData:
      # The Service Map / Service Graph panel queries Tempo's
      # `traces_service_graph_*` metrics, which Tempo writes to Prometheus
      # via remote_write. Pointing Grafana at the same Prometheus closes
      # the loop.
      serviceMap:
        datasourceUid: prometheus

      # When you click a span in Explore, Grafana can pivot to PromQL
      # against the linked metric backend. Useful for "what was the request
      # rate for this service when this trace happened".
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: '-2m'
        spanEndTimeShift: '2m'
        tags:
          - { key: 'service.name', value: 'service' }
        queries:
          - name: 'Request rate (span-metrics)'
            query: 'sum by (service) (rate(traces_spanmetrics_calls_total{$$__tags}[$$__rate_interval]))'
          - name: 'Error rate (span-metrics)'
            query: 'sum by (service) (rate(traces_spanmetrics_calls_total{$$__tags, status_code="STATUS_CODE_ERROR"}[$$__rate_interval]))'
          - name: 'p99 latency (span-metrics)'
            query: 'histogram_quantile(0.99, sum by (le, service) (rate(traces_spanmetrics_latency_bucket{$$__tags}[$$__rate_interval])))'

      nodeGraph:
        enabled: true

      search:
        hide: false
