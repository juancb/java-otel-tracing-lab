# OpenTelemetry Collector pipeline.
#
# Stage B addition: a `transform/peer_service` processor that rewrites the
# attributes Tempo's service-graph generator uses to label destination nodes,
# so HBase-related spans collapse onto the real `hbase-regionserver` node
# instead of phantom `hbase` / `default` nodes.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 25

  resource/lab:
    attributes:
      - key: deployment.environment
        value: local-otel-lab
        action: upsert

  # HBase 2.5+ ships its own OTel client-side instrumentation. Its outgoing
  # client spans set:
  #   - peer.service = "hbase"  (literal string)            -> phantom `hbase` node
  #   - db.system    = "hbase"
  #   - db.name      = "default"  (the default namespace)   -> phantom `default` node
  # Tempo's service-graph generator picks the destination label by checking
  # peer.service first, then db.name, then db.system. We force any span with
  # db.system=hbase to advertise peer.service=hbase-regionserver so all three
  # phantom-source paths collapse onto the real RS node. Catches both the
  # consumer's data-path spans and HBase Master's internal admin RPC spans.
  transform/peer_service:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          # 1. Direct rewrite of the literal peer.service=hbase. Belt + braces.
          - set(attributes["peer.service"], "hbase-regionserver") where attributes["peer.service"] == "hbase"
          # 2. Catch-all: every HBase RPC carries db.system=hbase, so this
          #    covers cases where peer.service is missing or set to something
          #    else like "default" (the HBase namespace name).
          - set(attributes["peer.service"], "hbase-regionserver") where attributes["db.system"] == "hbase"

  batch:
    send_batch_size: 1024
    timeout: 5s

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/lab, transform/peer_service, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource/lab, batch]
      exporters: [prometheusremotewrite, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/lab, batch]
      exporters: [debug]
