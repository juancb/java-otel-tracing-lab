# OpenTelemetry Collector pipeline.
#
# Stage B addition: a `transform/peer_service` processor that rewrites
# `peer.service=hbase` to `hbase-regionserver` on client spans, so the
# Stage A service graph collapses the disjoint `consumer -> hbase` edge
# into a connected component reaching `hbase-regionserver`.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 25

  resource/lab:
    attributes:
      - key: deployment.environment
        value: local-otel-lab
        action: upsert

  # Stage B: HBase 2.5+ ships its own OTel client-side instrumentation that
  # hard-codes peer.service="hbase" - which doesn't match any actual
  # service.name in the lab. Tempo's service-graph generator uses
  # peer.service for the destination node, so we end up with a phantom
  # "hbase" node disconnected from hbase-master / hbase-regionserver.
  # Rewrite client-side spans whose peer.service is the literal "hbase" to
  # the role we actually expect (regionserver, since it serves the data
  # path).
  transform/peer_service:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["peer.service"], "hbase-regionserver") where attributes["peer.service"] == "hbase"

  batch:
    send_batch_size: 1024
    timeout: 5s

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/lab, transform/peer_service, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource/lab, batch]
      exporters: [prometheusremotewrite, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/lab, batch]
      exporters: [debug]
