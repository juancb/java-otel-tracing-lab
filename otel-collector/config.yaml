# OpenTelemetry Collector pipeline.
#
# Receives OTLP from every JVM in the lab on both gRPC and HTTP, then fans out:
#
#   traces  -> tempo (OTLP)         + debug (stdout)
#   metrics -> prometheus (remote_write) + debug
#   logs    -> debug (no logs backend in Stage A; Stage C will add Loki)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 25

  resource/lab:
    attributes:
      - key: deployment.environment
        value: local-otel-lab
        action: upsert

  batch:
    send_batch_size: 1024
    timeout: 5s

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Forwards every metric the JVM agents emit to Prometheus's remote_write
  # endpoint. Tempo also writes service-graph + span-metrics directly to
  # Prometheus on its own; the two streams coexist.
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    # Promote OTel resource attributes to Prometheus labels so we can filter
    # by service.name, container, etc. in PromQL.
    resource_to_telemetry_conversion:
      enabled: true

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/lab, batch]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource/lab, batch]
      exporters: [prometheusremotewrite, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource/lab, batch]
      exporters: [debug]
