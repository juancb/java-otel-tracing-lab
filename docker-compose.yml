# End-to-end docker-compose for the Kafka -> HBase OTel tracing lab.
#
# Stage A wired Prometheus into the picture. Stage B attaches a
# jmx_prometheus_javaagent to every JVM and exposes its scrape port:
#
#   kafka              :7071
#   hbase-master       :7072
#   hbase-regionserver :7073
#   hadoop-namenode    :7074
#   hadoop-datanode    :7075
#
# JMX exporter YAML configs live under jmx-exporter/ and are bind-mounted
# into each Hadoop/HBase container at /etc/jmx-exporter/.

name: otel-lab

x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: otlp
  OTEL_LOGS_EXPORTER: otlp
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local-otel-lab

x-hadoop-hbase-build: &hadoop-hbase-build
  build:
    context: docker/hadoop-hbase
  image: otel-lab/hadoop-hbase:local

services:
  # --- Observability stack ---------------------------------------------------
  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    depends_on:
      prometheus:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3200/ready" ]
      interval: 5s
      timeout: 3s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: otel-collector
    command: [ "--config=/etc/otel/config.yaml" ]
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "55679:55679"
    depends_on:
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
      - "--enable-feature=native-histograms"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9090/-/ready" ]
      interval: 5s
      timeout: 3s
      retries: 20

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  zookeeper:
    build:
      context: docker/zookeeper
    image: otel-lab/zookeeper:local
    container_name: zookeeper
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: zookeeper
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,stat,mntr,conf"
      SERVER_JVMFLAGS: "-javaagent:/opt/otel/opentelemetry-javaagent.jar"
    ports:
      - "2181:2181"
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok" ]
      interval: 5s
      timeout: 3s
      retries: 20

  # --- HDFS ------------------------------------------------------------------
  namenode:
    <<: *hadoop-hbase-build
    container_name: namenode
    command: [ "namenode" ]
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: hadoop-namenode
    volumes:
      - hdfs-name:/data/dfs/name
      - ./jmx-exporter:/etc/jmx-exporter:ro
    ports:
      - "9870:9870"
      - "8020:8020"
      - "7074:7074"
    depends_on:
      otel-collector:
        condition: service_started
    # Verify NN is out of safemode AND the RPC port is open. Plain `curl /`
    # passes too early - the HTTP UI starts before HDFS RPC is ready.
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -sf http://localhost:9870/ > /dev/null \
          && hdfs dfsadmin -fs hdfs://localhost:8020 -safemode get 2>&1 | grep -q OFF
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  datanode:
    <<: *hadoop-hbase-build
    container_name: datanode
    command: [ "datanode" ]
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: hadoop-datanode
    volumes:
      - hdfs-data:/data/dfs/data
      - ./jmx-exporter:/etc/jmx-exporter:ro
    ports:
      - "7075:7075"
    depends_on:
      namenode:
        condition: service_healthy
    # The DN's HTTP port (9864) comes up immediately, but registration with
    # the NN can lag by 30s+. We ask the NN how many live DataNodes it sees;
    # only succeed when there's at least one.
    healthcheck:
      test:
        - CMD-SHELL
        - |
          curl -sf "http://namenode:9870/jmx?qry=Hadoop:service=NameNode,name=FSNamesystemState" \
            | grep -q '"NumLiveDataNodes" : [1-9]'
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s

  # --- HBase -----------------------------------------------------------------
  hbase-master:
    <<: *hadoop-hbase-build
    container_name: hbase-master
    command: [ "hmaster" ]
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: hbase-master
    volumes:
      - ./jmx-exporter:/etc/jmx-exporter:ro
    ports:
      - "16000:16000"
      - "16010:16010"
      - "7072:7072"
    depends_on:
      datanode:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:16010/ > /dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  hbase-regionserver:
    <<: *hadoop-hbase-build
    container_name: hbase-regionserver
    command: [ "regionserver" ]
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: hbase-regionserver
    volumes:
      - ./jmx-exporter:/etc/jmx-exporter:ro
    ports:
      - "16030:16030"
      - "7073:7073"
    depends_on:
      hbase-master:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:16030/ > /dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # --- Kafka (KRaft) ---------------------------------------------------------
  kafka:
    build:
      context: docker/kafka
    image: otel-lab/kafka:local
    container_name: kafka
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: kafka
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OPTS: "-javaagent:/opt/otel/opentelemetry-javaagent.jar -javaagent:/opt/jmx-exporter/jmx_prometheus_javaagent.jar=7071:/etc/jmx-exporter/kafka.yaml"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./jmx-exporter:/etc/jmx-exporter:ro
    ports:
      - "9092:9092"
      - "29092:29092"
      - "7071:7071"
    depends_on:
      otel-collector:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  producer:
    build:
      context: apps
      dockerfile: producer/Dockerfile
    image: otel-lab/producer:local
    container_name: producer
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: producer
      BOOTSTRAP_SERVERS: kafka:9092
      TOPIC: sensor.readings
      RATE_PER_SEC: "5"
      NUM_DEVICES: "50"
    depends_on:
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  consumer:
    build:
      context: apps
      dockerfile: consumer/Dockerfile
    image: otel-lab/consumer:local
    container_name: consumer
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: consumer
      BOOTSTRAP_SERVERS: kafka:9092
      TOPIC: sensor.readings
      GROUP_ID: sensor-consumer
      HBASE_ZK_QUORUM: zookeeper
      HBASE_TABLE: sensor_readings
    depends_on:
      kafka:
        condition: service_healthy
      hbase-regionserver:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

volumes:
  tempo-data:
  prometheus-data:
  grafana-data:
  hdfs-name:
  hdfs-data:
  kafka-data:
