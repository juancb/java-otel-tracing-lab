# Minimal log4j config for HBase, tuned to keep output readable in
# `docker compose logs`. We log at INFO to console with a short timestamp.

log4j.rootLogger=INFO, console

log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.err
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{HH:mm:ss} %-5p [%c{1}] %m%n

# Quiet down the noisier subsystems so OTel-related logs aren't drowned out.
log4j.logger.org.apache.zookeeper=WARN
log4j.logger.org.apache.hadoop.hbase.zookeeper=WARN
log4j.logger.org.apache.hadoop.metrics2=WARN
log4j.logger.org.apache.hadoop.hdfs=INFO
log4j.logger.org.apache.hadoop.ipc=INFO

# OTel agent's own logging — useful for confirming the agent loaded.
log4j.logger.io.opentelemetry=INFO
